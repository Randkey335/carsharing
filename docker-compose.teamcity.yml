version: '3.8'

services:
  teamcity-server:
    image: jetbrains/teamcity-server:latest
    container_name: teamcity-server
    restart: unless-stopped
    ports:
      - "8111:8111"
    volumes:
      - teamcity_server_data:/data/teamcity_server/datadir
      - teamcity_server_logs:/opt/teamcity/logs
    environment:
      - TEAMCITY_SERVER_MEM_OPTS=-Xmx2g
    networks:
      - teamcity-network

  teamcity-agent:
    build:
      context: .
      dockerfile: Dockerfile.teamcity-agent
    container_name: teamcity-agent
    restart: unless-stopped
    depends_on:
      - teamcity-server
    environment:
      - SERVER_URL=http://teamcity-server:8111
      - AGENT_NAME=default_agent
    volumes:
      - teamcity_agent_conf:/data/teamcity_agent/conf
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - teamcity-network

volumes:
  teamcity_server_data:
  teamcity_server_logs:
  teamcity_agent_conf:

networks:
  teamcity-network:
    driver: bridge