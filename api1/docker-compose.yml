version: '3.8'

services:
  db:
    image: postgres:15
    container_name: department_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: university_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d university_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: department_api
    ports:
      - "5002:5000"
    environment:
      DATABASE_URL: postgresql://admin:secret123@db:5432/university_db
      FLASK_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
